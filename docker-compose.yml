services:

  postgres:
    image: postgres:16
    container_name: itops-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: itops

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus

    container_name: itops-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  node-exporter:
    image: prom/node-exporter

    container_name: itops-node-exporter

    ports:
      - "9100:9100"

volumes:
  postgres_data: